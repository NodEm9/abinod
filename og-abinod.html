<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=1200, initial-scale=1" />
    <title>Abinod OG</title>
    <style>
      :root {
        --ink: #080f14;
        --panel: #111820;
        --gold: #d4af37;
        --gold-soft: #f1d673;
        --muted: rgba(255, 255, 255, 0.68);
        --white: #ffffff;
        --blue: #3d96ff;
        --cyan: #00d4ff;
        --violet: #7861ff;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        width: 1200px;
        height: 630px;
        overflow: hidden;
        color: var(--white);
        background:
          radial-gradient(circle at 74% 26%, rgba(212, 175, 55, 0.2), transparent 26%),
          radial-gradient(circle at 74% 78%, rgba(61, 150, 255, 0.13), transparent 30%),
          linear-gradient(135deg, #050a0e 0%, #10171d 48%, #252b30 100%);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      .frame {
        position: relative;
        display: grid;
        grid-template-columns: 1fr 430px;
        gap: 68px;
        width: 1200px;
        height: 630px;
        padding: 64px 76px;
      }

      .frame::before {
        content: "";
        position: absolute;
        inset: auto 0 0;
        height: 34%;
        background:
          linear-gradient(160deg, transparent 0 20%, rgba(245, 243, 239, 0.08) 20% 21%, transparent 21%),
          linear-gradient(20deg, #111820 0 42%, #030608 42% 100%);
        clip-path: polygon(0 48%, 20% 28%, 35% 45%, 50% 20%, 66% 50%, 82% 32%, 100% 58%, 100% 100%, 0 100%);
        opacity: 0.48;
      }

      .copy,
      .visual {
        position: relative;
        z-index: 1;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 14px;
        margin-bottom: 88px;
        color: var(--white);
        font-size: 18px;
        font-weight: 800;
        letter-spacing: 0.34em;
        text-transform: uppercase;
      }

      .brand svg {
        width: 42px;
        height: 42px;
      }

      h1 {
        max-width: 650px;
        margin: 0 0 30px;
        font-size: 70px;
        line-height: 0.98;
        letter-spacing: 0;
      }

      .subtext {
        max-width: 660px;
        margin: 0;
        color: var(--muted);
        font-size: 27px;
        line-height: 1.35;
      }

      .visual {
        display: grid;
        place-items: center;
      }

      .system {
        position: relative;
        width: 390px;
        height: 480px;
      }

      .glow {
        position: absolute;
        inset: 0 0 80px;
        background:
          radial-gradient(circle at 50% 19%, rgba(212, 175, 55, 0.48), transparent 26%),
          radial-gradient(circle at 52% 80%, rgba(61, 150, 255, 0.18), transparent 42%);
        filter: blur(16px);
      }

      .keystone {
        position: absolute;
        top: 20px;
        left: 50%;
        width: 132px;
        height: 132px;
        transform: translateX(-50%);
        filter: drop-shadow(0 24px 54px rgba(212, 175, 55, 0.34));
      }

      .keystone-label {
        position: absolute;
        top: 154px;
        left: 0;
        right: 0;
        color: rgba(255, 255, 255, 0.78);
        font-size: 15px;
        font-weight: 900;
        letter-spacing: 0.22em;
        text-align: center;
        text-transform: uppercase;
      }

      .line {
        position: absolute;
        top: 190px;
        left: 50%;
        width: 1px;
        height: 86px;
        background: linear-gradient(var(--gold), rgba(212, 175, 55, 0.1));
      }

      .abinod {
        position: absolute;
        top: 286px;
        left: 0;
        right: 0;
        color: var(--white);
        font-size: 22px;
        font-weight: 900;
        letter-spacing: 0.32em;
        text-align: center;
      }

      .branches {
        position: absolute;
        top: 340px;
        left: 50%;
        width: 260px;
        height: 54px;
        border-top: 2px solid rgba(212, 175, 55, 0.58);
        transform: translateX(-50%);
      }

      .branches::before,
      .branches::after {
        content: "";
        position: absolute;
        top: -2px;
        width: 2px;
        height: 54px;
        background: rgba(212, 175, 55, 0.48);
      }

      .branches::before {
        left: 0;
      }

      .branches::after {
        right: 0;
      }

      .branches span {
        position: absolute;
        top: -2px;
        left: 50%;
        width: 2px;
        height: 54px;
        background: rgba(212, 175, 55, 0.56);
        transform: translateX(-50%);
      }

      .products {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 0;
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 18px;
        align-items: end;
      }

      .product {
        display: grid;
        justify-items: center;
        gap: 10px;
        min-height: 86px;
      }

      .product-logo {
        width: 54px;
        height: 54px;
        object-fit: contain;
      }

      .future-dot {
        width: 42px;
        height: 42px;
        border: 2px solid rgba(255, 255, 255, 0.42);
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.04);
      }

      .product span {
        color: rgba(255, 255, 255, 0.74);
        font-size: 13px;
        font-weight: 800;
        letter-spacing: 0.06em;
      }
    </style>
  </head>
  <body>
    <div class="frame">
      <section class="copy">
        <div class="brand">
          <svg viewBox="0 0 128 128" aria-hidden="true">
            <path fill="#D4AF37" d="M64 12 118 108H92L64 58 36 108H10L64 12Z" />
            <path fill="#080F14" d="M64 38 100 108H82L64 74 46 108H28L64 38Z" />
            <path fill="#D4AF37" d="M57 82h14l13 26H69l-5-10-5 10H44l13-26Z" />
            <path fill="#F1D673" d="M64 12 76 33 69 45 64 36 43 73H29L64 12Z" opacity=".78" />
          </svg>
          <span>Abinod</span>
        </div>

        <h1>Strong foundations create stronger systems.</h1>
        <p class="subtext">
          Abinod builds infrastructure products around clarity, reliable
          execution, and long-term maintainability.
        </p>
      </section>

      <section class="visual" aria-label="Abinod keystone ecosystem diagram">
        <div class="system">
          <div class="glow"></div>
          <svg class="keystone" viewBox="0 0 128 128" aria-hidden="true">
            <path fill="#D4AF37" d="M64 12 118 108H92L64 58 36 108H10L64 12Z" />
            <path fill="#080F14" d="M64 38 100 108H82L64 74 46 108H28L64 38Z" />
            <path fill="#D4AF37" d="M57 82h14l13 26H69l-5-10-5 10H44l13-26Z" />
            <path fill="#F1D673" d="M64 12 76 33 69 45 64 36 43 73H29L64 12Z" opacity=".78" />
          </svg>
          <div class="keystone-label">Keystone</div>
          <div class="line"></div>
          <div class="abinod">ABINOD</div>
          <div class="branches"><span></span></div>
          <div class="products">
            <div class="product">
              <img class="product-logo" src="assets/ambiten-mark.svg" alt="" />
              <span>Ambiten</span>
            </div>
            <div class="product">
              <i class="future-dot"></i>
              <span>Future</span>
            </div>
            <div class="product">
              <i class="future-dot"></i>
              <span>Future</span>
            </div>
          </div>
        </div>
      </section>
    </div>
  </body>
</html>
